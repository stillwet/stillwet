services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stillwet_merch
    ports:
      - "5432:5432"
    volumes:
      - stillwet_pgdata:/var/lib/postgresql/data

volumes:
  stillwet_pgdata:
